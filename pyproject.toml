[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nuitka_reporter"
version = "0.1.0"
authors = [
  { name="James Morrow", email="james@corner.dev" },
]
description = "A small package that converts a nuitka compile report into a readable html file"
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "minify-html-onepass==0.15.0",
    "dash>=3.0.2",
    "plotly>=6.0.1
]

[project.urls]
"Homepage" = "https://github.com/CryoDryOfficial/Pfeiffer-Vacuum-Protocol"
"Bug Tracker" = "https://github.com/CryoDryOfficial/Pfeiffer-Vacuum-Protocol/issues"